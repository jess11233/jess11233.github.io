<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #111;
    }

    /* ── Navigation ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      font-size: 14px;
      color: #999;
      text-decoration: none;
    }

    nav ul li a.active {
      color: #111;
      font-weight: 600;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 4rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero-img {
      width: 280px;
      height: 320px;
      border-radius: 8px;
      background: #ccc;
      flex-shrink: 0;
      object-fit: cover;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text p {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.35;
    }

    /* ── Project Grid ── */
    .projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .project-card {
      height: 280px;
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    /* Swap these colors for your own project thumbnails */
    .project-card:nth-child(1) { background: #b97cf8; }
    .project-card:nth-child(2) { background: #e8140a; }
    .project-card:nth-child(3) { background: #1a1a1a; }
    .project-card:nth-child(4) { background: #f5c842; }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.25);
      padding: 4px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Your Name</div>
    <ul>
      <li><a href="#" class="active">Work</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Resume</a></li>
      <li><a href="#">Calendly</a></li>
    </ul>
  </nav>

  <section class="hero">
    <img class="hero-img" src="your-photo.jpg" alt="Your photo" />
    <div class="hero-text">
      <p>
        I'm [Name]! Designer at [Company]. Previously at [Company A],
        [Company B], and [Company C]. I care about [value 1],
        [value 2], and [value 3].
      </p>
    </div>
  </section>

  <section class="projects">
    <a href="#" class="project-card">
      <span class="card-label">Project 1</span>
    </a>
    <a href="#" class="project-card">
      <span class="card-label">Project 2</span>
    </a>
    <a href="#" class="project-card">
      <span class="card-label">Project 3</span>
    </a>
    <a href="#" class="project-card">
      <span class="card-label">Project 4</span>
    </a>
  </section>

</body>
</html>
